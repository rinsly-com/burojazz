name: Deploy ACCP (CMS)

# The accp worker (burojazz-accp) is the dynamic Payload CMS + live preview at
# accp.burojazz.com. "pnpm run deploy" migrates the accp D1 (lint:migrations
# first) then builds + deploys via opennextjs-cloudflare. Runs on code changes
# to main; the static production site is deployed separately (deploy-prod.yml).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-burojazz-accp
  cancel-in-progress: false

jobs:
  deploy:
    permissions:
      contents: read
      packages: read
    uses: rinsly-com/rinsly-template/.github/workflows/site-deploy.yml@main
    secrets: inherit
    # deploy-command defaults to "pnpm run deploy".
