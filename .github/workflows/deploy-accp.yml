name: Deploy ACCP (CMS)

# The accp worker (burojazz-accp) is the dynamic Payload CMS + live preview at
# accp.burojazz.com. "pnpm run deploy" migrates the accp D1 (lint:migrations
# first) then builds + deploys via opennextjs-cloudflare.
#
# Self-contained (inlined) copy of the fleet pipeline. Canonical source:
# rinsly-com/rinsly-template/.github/workflows/site-deploy.yml — kept in sync by
# the fleet tooling. (Inlined rather than referenced because GitHub's private
# cross-repo reusable-workflow access was unreliable for this org.)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-burojazz-accp
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js + GitHub Packages auth
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@rinsly-com'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN || github.token }}

      - name: Build + deploy
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN || github.token }}
